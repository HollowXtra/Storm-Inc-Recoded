name: SZ Weather Auto Scraper

on:
  schedule:
    # 这里的 cron 时间是 UTC 时间
    # UTC 45 分 对应 北京时间 45 分 (小时数+8)
    - cron: '45 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20     # 防止某次卡死导致 Actions 一直挂着不结束
 
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
 
      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install selenium webdriver-manager ddddocr pillow
 
      - name: 安装 Chrome
        uses: browser-actions/setup-chrome@v1
 
      - name: 运行抓取脚本
        run: python wind.py
 
      - name: 归档当日数据
        if: success()
        run: |
          mkdir -p archive
          # 用北京时间给归档文件命名
          BJ_DATE=$(date -u -d '+8 hours' +%Y%m%d)
          cp sz_wind_data_updated.csv "archive/sz_wind_${BJ_DATE}.csv"
 
      - name: 提交结果
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sz_wind_data_updated.csv weather_mapping.json archive/
          git diff --cached --quiet && echo "无变化，跳过提交" || git commit -m "自动更新: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M') 数据"
          git push
