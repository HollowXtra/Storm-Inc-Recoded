name: SZ Weather Auto Scraper

on:
  schedule:
    # 这里的 cron 时间是 UTC 时间；UTC 45 分对应北京时间 45 分（小时数+8）
    - cron: '45 * * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20     # 防止某次卡死导致 Actions 一直挂着不结束

    steps:
      # 放在最前面：先判断时间窗口，20点之后直接跳过，
      # 避免消耗 Actions 分钟数，也避免误覆盖当日数据
      - name: 检查时间窗口（20点后跳过，避免覆盖当日数据）
        id: check_time
        run: |
          BJ_HOUR=$(date -u -d '+8 hours' +%H)
          echo "当前北京时间小时: ${BJ_HOUR}"
          # 数据源每天20点切换统计周期，20点及以后抓到的是下一日刚开始积累的数据，
          # 不能用来覆盖今天的最终数据，所以直接跳过本次运行
          if [ "$BJ_HOUR" -ge 20 ]; then
            echo "已过北京时间20点，数据源已切换统计日，跳过本次抓取"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 检出仓库
        if: steps.check_time.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: 设置 Python
        if: steps.check_time.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        if: steps.check_time.outputs.skip != 'true'
        run: |
          pip install --upgrade pip
          pip install selenium webdriver-manager ddddocr pillow

      - name: 安装 Chrome
        if: steps.check_time.outputs.skip != 'true'
        uses: browser-actions/setup-chrome@v1

      - name: 运行抓取脚本
        if: steps.check_time.outputs.skip != 'true'
        run: python wind.py

      - name: 归档当日数据
        if: steps.check_time.outputs.skip != 'true' && success()
        run: |
          mkdir -p archive
          # 用北京时间给归档文件命名
          BJ_DATE=$(date -u -d '+8 hours' +%Y%m%d)
          cp sz_wind_data_updated.csv "archive/sz_wind_${BJ_DATE}.csv"

      - name: 提交结果
        if: steps.check_time.outputs.skip != 'true' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sz_wind_data_updated.csv weather_mapping.json archive/
          git diff --cached --quiet && echo "无变化，跳过提交" || git commit -m "自动更新: $(date -u -d '+8 hours' '+%Y-%m-%d %H:%M') 数据"
          git push
